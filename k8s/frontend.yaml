apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-runtime-graph-frontend
  namespace: kube-system
  labels:
    app: kube-runtime-graph-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kube-runtime-graph-frontend
  template:
    metadata:
      labels:
        app: kube-runtime-graph-frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/biswa/kube-runtime-graph-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_BACKEND_URL
          value: "http://localhost:3001"
---
apiVersion: v1
kind: Service
metadata:
  name: kube-runtime-graph-frontend
  namespace: kube-system
spec:
  type: ClusterIP
  selector:
    app: kube-runtime-graph-frontend
  ports:
  - port: 80
    targetPort: 3000
