apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-runtime-graph-backend
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-runtime-graph-backend
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-runtime-graph-agent # reuse the same clusterrole for reads
subjects:
- kind: ServiceAccount
  name: kube-runtime-graph-backend
  namespace: kube-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-runtime-graph-backend
  namespace: kube-system
  labels:
    app: kube-runtime-graph-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kube-runtime-graph-backend
  template:
    metadata:
      labels:
        app: kube-runtime-graph-backend
    spec:
      serviceAccountName: kube-runtime-graph-backend
      containers:
      - name: backend
        image: ghcr.io/biswa/kube-runtime-graph-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: kube-runtime-graph-backend
  namespace: kube-system
spec:
  type: ClusterIP
  selector:
    app: kube-runtime-graph-backend
  ports:
  - port: 3001
    targetPort: 3001
