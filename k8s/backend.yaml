apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-runtime-graph-backend
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-runtime-graph-backend
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-runtime-graph-agent # reuse the same clusterrole for reads
subjects:
- kind: ServiceAccount
  name: kube-runtime-graph-backend
  namespace: kube-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-runtime-graph-backend
  namespace: kube-system
  labels:
    app: kube-runtime-graph-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kube-runtime-graph-backend
  template:
    metadata:
      labels:
        app: kube-runtime-graph-backend
    spec:
      serviceAccountName: kube-runtime-graph-backend
      imagePullSecrets:
      - name: ghcr-login
      containers:
      - name: backend
        image: ghcr.io/nebulamatch/kube-runtime-graph-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
        # Use a startupProbe to give the app time to initialize without
        # being killed by the liveness probe. Readiness and liveness probes
        # are relaxed to reduce race conditions during startup.
        startupProbe:
          httpGet:
            path: /api/health/ready
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 30
        readinessProbe:
          httpGet:
            path: /api/health/ready
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /api/health/live
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: kube-runtime-graph-backend
  namespace: kube-system
spec:
  type: NodePort
  selector:
    app: kube-runtime-graph-backend
  ports:
  - port: 3001
    targetPort: 3001
    nodePort: 32001
